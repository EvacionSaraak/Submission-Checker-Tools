<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Allocator</title>
<link rel="stylesheet" href="../css/tables.css" />
<style>
  #allocator-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  #left-panel {
    flex: 1 1 260px;
    min-width: 220px;
    max-width: 320px;
  }

  #right-panel {
    flex: 2 1 400px;
  }

  #dept-section {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 10px;
    max-height: 320px;
    overflow-y: auto;
    background: #fafafa;
  }

  #dept-section label {
    display: block;
    padding: 3px 0;
    font-size: 13px;
    cursor: pointer;
  }

  #dept-section label:hover {
    background: #f0f0f0;
  }

  #coders-textarea {
    width: 100%;
    box-sizing: border-box;
    font-size: 13px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: vertical;
    font-family: Arial, sans-serif;
  }

  .section-label {
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 6px;
    display: block;
  }

  #dept-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }

  #dept-controls button {
    font-size: 12px;
    padding: 3px 8px;
  }

  #allocation-preview {
    margin-top: 16px;
    overflow-x: auto;
  }

  #allocation-preview table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }

  #allocation-preview th,
  #allocation-preview td {
    border: 1px solid #ddd;
    padding: 4px 8px;
    text-align: left;
  }

  #allocation-preview th {
    background: #f0f0f0;
    font-weight: bold;
  }

  #allocation-preview tr:nth-child(even) td {
    background: #f9f9f9;
  }

  #preset-select {
    font-size: 13px;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    width: 100%;
  }
</style>
</head>
<body>

<div class="form-row">
  <label for="allocator-file"><strong>Upload XLSX file:</strong></label>
  <input type="file" id="allocator-file" accept=".xlsx" />
</div>

<div id="messageBox" style="margin-bottom: 10px; color: red; font-weight: bold;"></div>

<div id="allocator-main" class="hidden">

  <div id="allocator-layout">

    <!-- Left: Departments + Preset + Coders -->
    <div id="left-panel">

      <div style="margin-bottom: 16px;">
        <span class="section-label">Facility Preset</span>
        <select id="preset-select">
          <option value="">-- None --</option>
        </select>
      </div>

      <div style="margin-bottom: 16px;">
        <span class="section-label">Coders <span style="font-weight:normal;font-size:12px;">(one per line)</span></span>
        <textarea id="coders-textarea" rows="6" placeholder="Enter coder names, one per line"></textarea>
      </div>

      <div>
        <span class="section-label">Departments</span>
        <div id="dept-controls">
          <button id="select-all-btn">All</button>
          <button id="deselect-all-btn">None</button>
        </div>
        <div id="dept-section">
          <!-- checkboxes injected here -->
        </div>
      </div>

    </div>

    <!-- Right: Actions + Preview -->
    <div id="right-panel">

      <div class="form-row">
        <button id="allocate-btn">Allocate</button>
        <button id="download-btn" disabled style="margin-left: 10px;">Download Result</button>
      </div>

      <div id="allocation-preview"></div>

    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="../js/checker_allocator.js"></script>
</body>
</html>
