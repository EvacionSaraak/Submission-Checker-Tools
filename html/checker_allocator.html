<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Allocator</title>
<link rel="stylesheet" href="../css/tables.css" />
<link rel="stylesheet" href="../css/checker_allocator.css" />
</head>
<body>

<div class="form-row">
  <label for="allocator-file"><strong>Upload XLSX file:</strong></label>
  <input type="file" id="allocator-file" accept=".xlsx" />
</div>

<div id="messageBox" style="margin-bottom: 10px; color: red; font-weight: bold;"></div>

<div id="allocator-main" class="hidden">

  <div id="allocator-layout">

    <!-- Left: Departments + Preset + Coders -->
    <div id="left-panel">

      <div style="margin-bottom: 16px;">
        <span class="section-label">Facility Preset</span>
        <select id="preset-select">
          <option value="">-- None --</option>
        </select>
      </div>

      <div style="margin-bottom: 16px;">
        <span class="section-label">Coders <span style="font-weight:normal;font-size:12px;">(one per line)</span></span>
        <textarea id="coders-textarea" rows="6" placeholder="Enter coder names, one per line"></textarea>
      </div>

      <div>
        <span class="section-label">Departments</span>
        <div id="dept-controls">
          <button id="select-all-btn">All</button>
          <button id="deselect-all-btn">None</button>
        </div>
        <div id="dept-section">
          <!-- checkboxes injected here -->
        </div>
        <div id="coder-summary" class="hidden"></div>
      </div>

    </div>

    <!-- Right: Actions + Preview -->
    <div id="right-panel">

      <div class="form-row">
        <button id="allocate-btn">Allocate</button>
        <button id="download-btn" disabled style="margin-left: 10px;">Download Result</button>
      </div>

      <div id="allocation-preview"></div>

    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="../js/checker_allocator.js"></script>
</body>
</html>
